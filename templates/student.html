<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Responsive Table</title>
    <style>
        /* Reset and Base Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
            color: #333;
        }

        /* Table Container for Responsiveness */
        .table-container {
            width: 100%;
            overflow-x: auto; /* Adds horizontal scroll on small screens */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            background-color: #fff;
        }

        /* Table Styling */
        .styled-table {
            width: 100%;
            border-collapse: collapse; /* Collapses adjacent borders into one */
            min-width: 600px; /* Prevents compression of data columns */
            text-align: left;
        }

        /* Header Styling */
        .styled-table thead tr {
            background-color: #009879;
            color: #ffffff;
            font-weight: bold;
        }

        .styled-table th, 
        .styled-table td {
            padding: 12px 15px;
        }

        /* Zebra Striping & Borders */
        .styled-table tbody tr {
            border-bottom: 1px solid #dddddd;
        }

        .styled-table tbody tr:nth-of-type(even) {
            background-color: #f3f3f3;
        }

        /* Hover Effect */
        .styled-table tbody tr:hover {
            background-color: #f1f7f5;
            cursor: pointer;
        }

        /* Highlight Last Row Border */
        .styled-table tbody tr:last-of-type {
            border-bottom: 2px solid #009879;
        }

        /* Status Badge Examples */
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .badge.active { background-color: #d4edda; color: #155724; }
        .badge.pending { background-color: #fff3cd; color: #856404; }
    </style>
</head>
<body>
<h2>Student Info by {{programmer_name}}</h2>
    <!-- Container enables horizontal scrolling if the screen is too narrow -->
    <div class="table-container">
        <table class="styled-table">
            <thead>
                <tr>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Id</th>
                    <th>Department</th>
                    <th>Matric</th>
                </tr>
            </thead>
            {% for student in students %}
            <tbody>
                <tr>
                    <td>{{student.first_name}}</td>
                    <td>{{student.last_name}}</td>
                    <td>{{student.role}}</td>
                    <td><span class="badge active">{{student.status}}</span></td>
                    <td>{{student.i_d}}</td>
                    <td>{{student.department}}</td>
                    <td>{{student.matric_number}}</td>
                </tr>
            </tbody>
            {% endfor %}
        </table>
    </div>

</body>
</html>
